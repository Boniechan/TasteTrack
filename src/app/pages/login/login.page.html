<ion-content class="login-content">
  <div class="login-header">
    <div class="brand-mark">
      <img src="assets/icon/tastetrack-logo.svg" alt="TasteTrack logo" />
    </div>
    <h1>Welcome Back!</h1>
    <p>Sign in to your TasteTrack account</p>
  </div>

  <div class="login-form-container">
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <input
            formControlName="email"
            type="email"
            placeholder="Enter your email"
            class="form-input"
            autocomplete="email"
          />
        </div>
        <div class="error-text" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
          Email is required
        </div>
        <div class="error-text" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
          Please enter a valid email
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter your password"
            class="form-input"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility"
          >
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </button>
        </div>
        <div class="error-text" *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
          Password is required
        </div>
      </div>

      <button type="button" class="forgot-password" (click)="forgotPassword()">Forgot Password?</button>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="isLoading" class="submit-btn">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="divider">OR CONTINUE WITH</div>

    <div class="social-buttons">
      <button type="button" (click)="loginWithGoogle()" class="social-btn google" aria-label="Continue with Google">
        <ion-icon name="logo-google" class="social-icon"></ion-icon>
      </button>
      <button type="button" (click)="loginWithApple()" class="social-btn apple" aria-label="Continue with Apple">
        <ion-icon name="logo-apple" class="social-icon"></ion-icon>
      </button>
      <button type="button" (click)="loginWithFacebook()" class="social-btn facebook" aria-label="Continue with Facebook">
        <ion-icon name="logo-facebook" class="social-icon"></ion-icon>
      </button>
    </div>

    <div class="signup-link">
      Don't have an account? <button type="button" class="link-btn" (click)="goToRegister()">Sign Up</button>
    </div>
  </div>
</ion-content>
