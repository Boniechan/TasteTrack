<nav class="bottom-nav" aria-label="Primary">
  <button
    *ngFor="let item of navItems"
    type="button"
    class="nav-item"
    [class.active]="isActive(item.route)"
    (click)="navigate(item.route)"
  >
    <span class="icon-wrap">
      <ion-icon [name]="isActive(item.route) ? item.activeIcon : item.icon"></ion-icon>
      <span *ngIf="isCart(item.route) && cartCount > 0" class="cart-badge">{{ cartCount }}</span>
    </span>
    <span>{{ item.label }}</span>
  </button>
</nav>
